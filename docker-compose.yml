services:

  # ─── Nginx ────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: community_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - community_net

  # ─── Laravel App (PHP-FPM) ─────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: community_app
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-laravel_db}
      - DB_USERNAME=${DB_USERNAME:-laravel_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    volumes:
      - .:/var/www/html
      - storage_data:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - community_net

  # ─── MySQL ────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: community_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel_db}
      MYSQL_USER: ${DB_USERNAME:-laravel_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    ports:
      - "${DB_EXPOSE_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - community_net

  # ─── Vite Dev Server (only used locally with --profile dev) ───────────────
  vite:
    image: node:22-alpine
    container_name: community_vite
    profiles: [dev]
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    networks:
      - community_net

volumes:
  mysql_data:
  storage_data:
  node_modules:

networks:
  community_net:
    driver: bridge
